<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanguo Rush LB</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260514-result-panel-fix-v1" />
  </head>
  <body>
    <main class="app">
      <section class="stage is-menu" id="stage">
        <canvas id="game" width="2784" height="1536" aria-label="虎牢关塔防战场"></canvas>

        <div class="start-screen screen-layer" id="startScreen" aria-label="游戏开始页面">
          <div class="start-audio-controls" aria-label="声音设置">
            <button class="menu-toggle is-on" id="menuToggleMusic" type="button" title="配乐开关">
              <span>配乐</span>
              <strong>ON</strong>
            </button>
            <button class="menu-toggle is-on" id="menuToggleSfx" type="button" title="音效开关">
              <span>音效</span>
              <strong>ON</strong>
            </button>
          </div>

          <div class="menu-actions" aria-label="主菜单">
            <button class="menu-image-button menu-start" id="menuStart" type="button" aria-label="开始游戏">
              <img src="./assets/start_button.png" alt="" draggable="false" />
            </button>
            <button class="menu-image-button menu-ranking" id="menuRanking" type="button" aria-label="排行榜">
              <img src="./assets/ranking_button.png" alt="" draggable="false" />
            </button>
          </div>
        </div>

        <div class="intro-screen screen-layer hidden" id="introScreen" aria-label="过场动画">
          <video id="introVideo" class="intro-video" playsinline preload="metadata"></video>
          <div class="intro-fallback" id="introFallback">
            <div class="intro-title">虎牢关战云压境</div>
            <div class="intro-line"></div>
          </div>
          <button class="skip-intro" id="skipIntro" type="button">跳过</button>
        </div>

        <div class="hud top-left">
          <div class="stats" id="stats"></div>
          <div class="wave-pill" id="waveInfo"></div>
        </div>

        <div class="hud top-right">
          <button class="icon-button icon-only" id="backHome" title="返回首页" aria-label="返回首页">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.3 12 4l9 7.3"/><path d="M5.5 10.2V20h5v-5.3h3V20h5v-9.8"/></svg>
          </button>
          <button class="icon-button icon-only sound-on" id="toggleMusic" title="配乐开关" aria-label="配乐开关">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18V5l10-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/></svg>
          </button>
          <button class="icon-button icon-only sound-on" id="toggleSfx" title="音效开关" aria-label="音效开关">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 15h4l5 4V5L8 9H4z"/><path d="M17 9.5a4 4 0 0 1 0 5"/><path d="M19.4 7a7.5 7.5 0 0 1 0 10"/></svg>
          </button>
          <button class="icon-button" id="togglePause" title="暂停/继续">II</button>
          <button class="icon-button" id="restart" title="重开">R</button>
        </div>

        <div class="hud wave-control" id="waveControl"></div>

        <div class="hud bottom-left">
          <div class="hero-card">
            <div class="hero-portrait"></div>
            <div class="hero-info" id="heroStatus"></div>
          </div>
          <div class="hero-skills">
            <button class="skill-button" id="skillBuff" type="button" aria-label="快斩"></button>
            <button class="skill-button" id="skillLine" type="button" aria-label="战神"></button>
          </div>
        </div>

        <div class="tower-popup hidden" id="towerPopup"></div>
        <div class="tower-tooltip hidden" id="towerTooltip"></div>
      </section>
    </main>

    <div class="modal hidden" id="resultModal">
      <div class="dialog">
        <div class="result-summary">
          <div>
            <div class="result-stars" id="resultStars" aria-label="结算星级"></div>
            <h2 id="resultTitle"></h2>
            <p id="resultBody"></p>
          </div>
          <div class="result-score" id="resultScore"></div>
        </div>
        <div class="result-ranking" id="resultRanking"></div>
        <div class="result-actions">
          <button id="resultNext" type="button">下一步</button>
          <button id="resultRestart" type="button">再来一局</button>
          <button id="resultBack" type="button">返回首页</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="rankingModal">
      <div class="dialog ranking-dialog">
        <div class="dialog-head">
          <h2>虎牢关 Ranking</h2>
          <button class="dialog-close" id="closeRanking" type="button" aria-label="关闭排行榜">×</button>
        </div>
        <div class="ranking-list" id="rankingList"></div>
      </div>
    </div>

    <script type="module" src="./src/game.js?v=20260514-lvbu-survival-v1"></script>
  </body>
</html>
