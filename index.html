<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanguo Rush LB</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260511-role-swap" />
  </head>
  <body>
    <main class="app">
      <section class="stage is-menu" id="stage">
        <canvas id="game" width="2784" height="1536" aria-label="虎牢关塔防战场"></canvas>

        <div class="start-screen screen-layer" id="startScreen" aria-label="游戏开始页面">
          <div class="start-audio-controls" aria-label="声音设置">
            <button class="menu-toggle is-on" id="menuToggleMusic" type="button" title="配乐开关">
              <span>配乐</span>
              <strong>ON</strong>
            </button>
            <button class="menu-toggle is-on" id="menuToggleSfx" type="button" title="音效开关">
              <span>音效</span>
              <strong>ON</strong>
            </button>
          </div>

          <div class="menu-actions" aria-label="主菜单">
            <button class="menu-image-button menu-start" id="menuStart" type="button" aria-label="开始游戏">
              <img src="./assets/start_button.png" alt="" draggable="false" />
            </button>
            <button class="menu-image-button menu-ranking" id="menuRanking" type="button" aria-label="排行榜">
              <img src="./assets/ranking_button.png" alt="" draggable="false" />
            </button>
          </div>
        </div>

        <div class="intro-screen screen-layer hidden" id="introScreen" aria-label="过场动画">
          <video id="introVideo" class="intro-video" playsinline preload="metadata"></video>
          <div class="intro-fallback" id="introFallback">
            <div class="intro-title">虎牢关战云压境</div>
            <div class="intro-line"></div>
          </div>
          <button class="skip-intro" id="skipIntro" type="button">跳过</button>
        </div>

        <div class="hud top-left">
          <div class="stats" id="stats"></div>
          <div class="wave-pill" id="waveInfo"></div>
        </div>

        <div class="hud top-right">
          <button class="icon-button sound-on" id="toggleMusic" title="配乐开关">乐</button>
          <button class="icon-button sound-on" id="toggleSfx" title="音效开关">效</button>
          <button class="icon-button" id="togglePause" title="暂停/继续">II</button>
          <button class="icon-button" id="restart" title="重开">R</button>
        </div>

        <div class="hud wave-control" id="waveControl"></div>

        <div class="hud bottom-left">
          <div class="hero-card">
            <div class="hero-portrait"></div>
            <div class="hero-info" id="heroStatus"></div>
          </div>
          <div class="hero-skills">
            <button class="skill-button" id="skillBuff">旋斩</button>
            <button class="skill-button" id="skillLine">剑气</button>
          </div>
        </div>

        <div class="hud bottom-right">
          <div class="speed-group">
            <button data-speed="1">1x</button>
            <button data-speed="2">2x</button>
            <button data-speed="4">4x</button>
          </div>
        </div>

        <div class="tower-popup hidden" id="towerPopup"></div>
        <div class="tower-tooltip hidden" id="towerTooltip"></div>
        <div class="log collapsed" id="logPanel">
          <button class="log-toggle" id="toggleLog" title="展开/收起战报">战报</button>
          <div class="log-list" id="log"></div>
        </div>
      </section>
    </main>

    <div class="modal hidden" id="resultModal">
      <div class="dialog">
        <h2 id="resultTitle"></h2>
        <p id="resultBody"></p>
        <button id="closeResult">继续查看</button>
      </div>
    </div>

    <script type="module" src="./src/game.js?v=20260511-role-swap"></script>
  </body>
</html>
