<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>真实音频素材审核</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        background: #161514;
        color: #f7ead8;
      }

      body {
        margin: 0;
        padding: 32px;
        background: #161514;
      }

      main {
        max-width: 940px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #cdbba2;
      }

      .track {
        display: grid;
        grid-template-columns: 240px 1fr;
        align-items: center;
        gap: 18px;
        padding: 14px 0;
        border-top: 1px solid rgb(247 234 216 / 0.16);
      }

      audio {
        width: 100%;
      }

      @media (max-width: 720px) {
        body {
          padding: 20px;
        }

        .track {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>真实音频素材审核</h1>
      <p>这些文件已经接入游戏，来源与授权记录在 CREDITS.md。</p>
      <section class="track"><strong>普通氛围 BGM</strong><audio controls src="./bgm_hulaoguan_ambient.mp3"></audio></section>
      <section class="track"><strong>旧版急促 BGM 备选</strong><audio controls src="./bgm_hulaoguan_battle_loop.wav"></audio></section>
      <section class="track"><strong>Boss/末波 BGM</strong><audio controls src="./bgm_hulaoguan_boss_loop.wav"></audio></section>
      <section class="track"><strong>开波号角 8s</strong><audio controls src="./stinger_wave_start_short.wav"></audio></section>
      <section class="track"><strong>建塔</strong><audio controls src="./tower_build_01.ogg"></audio></section>
      <section class="track"><strong>升级</strong><audio controls src="./tower_upgrade_01.ogg"></audio></section>
      <section class="track"><strong>拆除</strong><audio controls src="./tower_dismantle_01.ogg"></audio></section>
      <section class="track"><strong>弓塔发射</strong><audio controls src="./tower_arrow_shot_01.ogg"></audio></section>
      <section class="track"><strong>弩塔发射</strong><audio controls src="./tower_crossbow_shot_01.ogg"></audio></section>
      <section class="track"><strong>法术塔发射</strong><audio controls src="./tower_magic_shot_01.ogg"></audio></section>
      <section class="track"><strong>火塔发射</strong><audio controls src="./tower_fire_shot_01.ogg"></audio></section>
      <section class="track"><strong>投石发射</strong><audio controls src="./tower_stone_shot_01.ogg"></audio></section>
      <section class="track"><strong>英雄点击</strong><audio controls src="./hero_select_01.ogg"></audio></section>
      <section class="track"><strong>英雄攻击</strong><audio controls src="./hero_attack_01.ogg"></audio></section>
      <section class="track"><strong>英雄技能</strong><audio controls src="./hero_skill_01.ogg"></audio></section>
      <section class="track"><strong>英雄死亡</strong><audio controls src="./hero_death_01.ogg"></audio></section>
      <section class="track"><strong>小兵攻击</strong><audio controls src="./enemy_attack_01.ogg"></audio></section>
      <section class="track"><strong>小兵死亡</strong><audio controls src="./enemy_death_01.ogg"></audio></section>
    </main>
  </body>
</html>
